/* ═══════════════════════════════════════════════════════════
   资产管理中心 - 全局样式
   ═══════════════════════════════════════════════════════════ */

/* Reset & Base */
* {
  box-sizing: border-box;
  margin: 0;
}

body {
  margin: 0;
  padding: 0;
}

::selection {
  background: #BFDBFE;
  color: #1E3A5F;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #D1D5DB;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: #9CA3AF;
}

/* Select dropdown */
select option {
  background: #FFFFFF;
  color: #111827;
}

/* Placeholder */
input::placeholder {
  color: #9CA3AF;
}

/* Hover helpers */
.hover-dim:hover {
  background: #F3F4F6 !important;
}
.hover-group:hover,
.hover-tag:hover {
  background: #F9FAFB !important;
}
.hover-detail-close:hover {
  color: #111827 !important;
}
/* [REMOVED] .hover-badge-close — 未被任何 JS/HTML 引用 */
.app-grid-card:hover:not(.sel) {
  box-shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.06) !important;
}
.app-list-card:hover:not(.sel) {
  background: #F9FAFB !important;
}

/* Keyframe Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideD {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(-16px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

@keyframes modalFade {
  from {
    opacity: 0;
    transform: scale(.97);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes panelSlide {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/** 按钮样式生成器 */
const btnStyle = (v = "default") => ({
  display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
  borderRadius: V.r, fontSize: 13, fontWeight: 500, fontFamily: font,
  padding: "8px 16px", cursor: "pointer", transition: "all .15s",
  border: v === "outline" ? `1px solid ${V.border}` : "none",
  background: v === "default" ? V.primary : v === "secondary" ? V.secondary : "transparent",
  color: v === "default" ? V.primaryFg : v === "outline" ? V.fgSoft : V.fgSoft,
});

/** 判断文件类型 */
const ft = f => (f?.type ?? "").startsWith("image/") ? "image" : (f?.type ?? "").startsWith("video/") ? "video" : "other";

/** 接受的 MIME 类型 */
const ACCEPT = ["image/jpeg", "image/png", "image/gif", "image/webp", "video/mp4", "video/quicktime", "video/webm"];

/** 校验文件是否为支持的媒体类型 */
const isValid = f => f?.type ? ACCEPT.some(a => f.type.startsWith(a.split("/")[0] + "/")) : false;

/** 生成随机短 ID */
const uid = () => Math.random().toString(36).slice(2, 9);

/**
 * 递归读取拖拽的目录项（文件或目录）
 * @param {FileSystemEntry} entry - 浏览器 DataTransfer API 的文件/目录条目
 * @returns {Promise<File[]>} 扁平化的有效媒体文件数组（经 isValid 过滤）
 * 副作用：无
 */
function readEntries(entry) {
  if (entry.isFile) {
    return new Promise(res => entry.file(f => res(isValid(f) ? [f] : [])));
  }
  if (entry.isDirectory) {
    const reader = entry.createReader();
    return new Promise(res => {
      const all = [];
      function readNext() {
        reader.readEntries(async entries => {
          if (entries.length === 0) {
            const nested = await Promise.all(all.map(readEntries));
            res(nested.flat());
          } else {
            all.push(...entries);
            readNext();
          }
        });
      }
      readNext();
    });
  }
  return Promise.resolve([]);
}

const { useState, useMemo, useCallback, useRef, useEffect } = React;

// ── CBox (复选框) ────────────────────────────────────────
function CBox({ on, onClick: oc, size = 15 }) {
  return (
    <div onClick={oc} style={{
      width: size, height: size, borderRadius: 3, flexShrink: 0, cursor: "pointer",
      border: on ? "none" : `1.5px solid ${V.border}`,
      background: on ? V.primary : V.bg,
      display: "flex", alignItems: "center", justifyContent: "center", transition: "all .1s",
    }}>
      {on && <span style={{ color: "#fff" }}>{I.Check(size - 4)}</span>}
    </div>
  );
}

// ── Badge (标签徽章) ─────────────────────────────────────
function Badge({ children, color = V.fg, bg = V.muted, onRemove }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px",
      borderRadius: V.rFull, fontSize: 12, fontWeight: 500, background: bg, color,
      whiteSpace: "nowrap", border: `1px solid ${color}15`,
    }}>
      {children}
      {onRemove && (
        <span onClick={e => { e.stopPropagation(); onRemove(); }}
          style={{ cursor: "pointer", opacity: .4, display: "flex", alignItems: "center", marginLeft: 2 }}
          onMouseEnter={e => e.currentTarget.style.opacity = 1}
          onMouseLeave={e => e.currentTarget.style.opacity = .4}
        >{I.X(10)}</span>
      )}
    </span>
  );
}

// ── Thumb (文件缩略图) ───────────────────────────────────
function Thumb({ file, size = 72 }) {
  const [url] = useState(() => (file instanceof Blob || file instanceof File) ? URL.createObjectURL(file) : "");
  const t = ft(file);
  useEffect(() => {
    return () => { if (url) URL.revokeObjectURL(url); };
  }, [url]);
  return (
    <div style={{
      width: size, height: size, borderRadius: V.r, overflow: "hidden", flexShrink: 0,
      background: V.muted, border: `1px solid ${V.border}`,
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      {(t === "image" && url) ? <img src={url} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        : (t === "video" && url) ? <video src={url} muted style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          : <span style={{ color: V.fgMuted }}>{I.Img()}</span>}
    </div>
  );
}

// ── CategorySelect (类别选择下拉) ────────────────────────
/**
 * 类别选择下拉组件，渲染 CATEGORIES 列表供用户选择
 * @param {string} value - 当前选中的 catId
 * @param {function} onChange - 选中后回调，参数为 catId
 */
function CategorySelect({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const cur = CATEGORIES.find(c => c.id === value);
  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(!open)} style={{
        display: "flex", alignItems: "center", gap: 8, padding: "8px 12px",
        border: `1px solid ${V.border}`, borderRadius: V.r, cursor: "pointer",
        fontSize: 13, color: cur ? V.fg : V.fgMuted, background: V.bg,
      }}
        onMouseEnter={e => e.currentTarget.style.borderColor = "#D1D5DB"}
        onMouseLeave={e => e.currentTarget.style.borderColor = V.border}
      >
        {I.Folder(14)}
        <span style={{ flex: 1 }}>{cur ? cur.name : "选择类别..."}</span>
        <span style={{ color: V.fgMuted, transform: open ? "rotate(180deg)" : "none", transition: "transform .15s" }}>{I.ChevD()}</span>
      </div>
      {open && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50, marginTop: 4,
          background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.r,
          boxShadow: V.shMd, overflow: "hidden",
        }}>
          {CATEGORIES.map(c => {
            const s = value === c.id;
            return (
              <div key={c.id} onClick={() => { onChange(c.id); setOpen(false); }} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "9px 14px",
                cursor: "pointer", fontSize: 13, color: s ? V.blue : V.fg,
                background: s ? V.blueBg : "transparent", fontWeight: s ? 500 : 400,
              }}
                onMouseEnter={e => { if (!s) e.currentTarget.style.background = V.muted; }}
                onMouseLeave={e => { if (!s) e.currentTarget.style.background = s ? V.blueBg : "transparent"; }}
              >
                <span style={{ flex: 1 }}>{c.name}</span>
                {s && <span style={{ color: V.blue }}>{I.Check(13)}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── EntityPicker (实体选择器) ─────────────────────────────
/**
 * 实体选择/新建组件，支持从列表选择或内联创建新实体
 * @param {Array} entities - 可选实体列表
 * @param {string|null} value - 当前关联的实体 ID
 * @param {function} onSelect - 选中实体回调，参数为 entId 或 null
 * @param {function} onCreate - 新建实体回调，参数为 {id, name, catId} 对象
 */
function EntityPicker({ entities, value, onSelect, onCreate }) {
  const [open, setOpen] = useState(false);
  const [making, setMaking] = useState(false);
  const [nn, setNn] = useState(""); const [nc, setNc] = useState("");
  const ent = entities.find(e => e.id === value);
  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(!open)} style={{
        display: "flex", alignItems: "center", gap: 8, padding: "8px 12px",
        border: `1px solid ${V.border}`, borderRadius: V.r, cursor: "pointer",
        fontSize: 13, color: ent ? V.fg : V.fgMuted, background: V.bg,
      }}
        onMouseEnter={e => e.currentTarget.style.borderColor = "#D1D5DB"}
        onMouseLeave={e => e.currentTarget.style.borderColor = V.border}
      >
        {I.Cube(14)} <span style={{ flex: 1 }}>{ent ? ent.name : "选择或创建实体..."}</span>
        <span style={{ color: V.fgMuted, transform: open ? "rotate(180deg)" : "none", transition: "transform .15s" }}>{I.ChevD()}</span>
      </div>
      {open && (
        <div style={{ position: "absolute", bottom: "100%", left: 0, right: 0, zIndex: 50, marginBottom: 4, background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.r, boxShadow: V.shMd, maxHeight: 260, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ overflowY: "auto", flex: 1 }}>
            <div onClick={() => { onSelect(null); setOpen(false); }} style={{ padding: "8px 14px", cursor: "pointer", fontSize: 13, color: !value ? V.blue : V.fgMuted }}
              onMouseEnter={e => e.currentTarget.style.background = V.muted} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>不关联</div>
            {entities.map(en => (
              <div key={en.id} onClick={() => { onSelect(en.id); setOpen(false); }} style={{ padding: "8px 14px", cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", gap: 6, color: value === en.id ? V.blue : V.fg, background: value === en.id ? V.blueBg : "transparent" }}
                onMouseEnter={e => { if (value !== en.id) e.currentTarget.style.background = V.muted; }}
                onMouseLeave={e => { if (value !== en.id) e.currentTarget.style.background = value === en.id ? V.blueBg : "transparent"; }}
              >{I.Cube(12)} <span>{en.name}</span>{en.catId && <span style={{ marginLeft: "auto", fontSize: 11, color: V.fgMuted }}>{CATEGORIES.find(c => c.id === en.catId)?.name}</span>}</div>
            ))}
          </div>
          <div style={{ borderTop: `1px solid ${V.border}`, padding: 10 }}>
            {!making ? (
              <button onClick={() => setMaking(true)} style={{ ...btnStyle("outline"), width: "100%" }}>{I.Plus(12)} 新建实体</button>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <input autoFocus value={nn} onChange={e => setNn(e.target.value)} placeholder="实体名称" style={{ width: "100%", padding: "7px 10px", border: `1px solid ${V.border}`, borderRadius: V.r, fontSize: 13, fontFamily: font, color: V.fg, outline: "none", boxSizing: "border-box" }} />
                <select value={nc} onChange={e => setNc(e.target.value)} style={{ width: "100%", padding: "7px 10px", border: `1px solid ${V.border}`, borderRadius: V.r, fontSize: 13, fontFamily: font, color: V.fg, outline: "none", boxSizing: "border-box", background: V.bg }}>
                  <option value="">所属类别（可选）</option>
                  {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => setMaking(false)} style={{ ...btnStyle("outline"), flex: 1, padding: "6px 0" }}>取消</button>
                  <button onClick={() => { if (!nn.trim()) return; const en = { id: uid(), name: nn.trim(), catId: nc || null }; onCreate(en); onSelect(en.id); setNn(""); setNc(""); setMaking(false); setOpen(false); }} style={{ ...btnStyle("default"), flex: 1, padding: "6px 0", opacity: nn.trim() ? 1 : .4 }}>创建</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── TagModal (标签选择弹窗) ──────────────────────────────
/**
 * 标签选择弹窗，按维度分 Tab 浏览标签，支持搜索、全选/清空、已选预览
 * @param {string[]} selected - 已选标签 ID 列表
 * @param {string} catId - 当前资产的类别 ID，用于过滤相关维度
 * @param {function} onConfirm - 确认回调，参数为选中的标签 ID 数组
 * @param {function} onClose - 关闭弹窗回调
 */
function TagModal({ selected, catId, onConfirm, onClose }) {
  const [sel, setSel] = useState(() => new Set(selected));
  const [search, setSearch] = useState("");

  // 按类别过滤维度；若该类别无专属维度则回退显示所有维度
  const filteredDims = useMemo(() => {
    const d = TAG_DIMS.filter(dim => dim.catId === catId);
    return d.length ? d : TAG_DIMS;
  }, [catId]);

  const [ag, setAg] = useState(filteredDims[0]?.id || null);

  const toggle = id => setSel(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });

  const sRes = useMemo(() => {
    if (!search.trim()) return null;
    const q = search.toLowerCase();
    return ALL_TAGS.filter(t => t.catId === catId && (t.name.toLowerCase().includes(q) || t.gName.toLowerCase().includes(q) || t.dName.toLowerCase().includes(q)));
  }, [search, catId]);

  const cntG = gid => {
    const dim = filteredDims.find(x => x.id === gid);
    if (!dim) return 0;
    let c = 0;
    dim.groups.forEach(g => (g.tagObjs ?? []).forEach(t => { if (sel.has(t.id)) c++; }));
    return c;
  };

  const ModalCBox = ({ on, onClick: oc }) => (
    <div onClick={oc} style={{
      width: 16, height: 16, borderRadius: 4, flexShrink: 0, cursor: "pointer",
      border: on ? "none" : `1.5px solid ${V.border}`,
      background: on ? V.primary : V.bg,
      display: "flex", alignItems: "center", justifyContent: "center", transition: "all .1s",
    }}>{on && <span style={{ color: "#fff" }}>{I.Check(10)}</span>}</div>
  );

  const selArr = Array.from(sel);
  const activeDim = filteredDims.find(d => d.id === ag) || filteredDims[0];

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.4)", backdropFilter: "blur(4px)" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: 820, maxWidth: "95vw", height: 600, maxHeight: "85vh",
        background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.rLg,
        display: "flex", flexDirection: "column", overflow: "hidden",
        boxShadow: V.shLg, animation: "modalFade .18s ease",
      }}>
        <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", gap: 8, borderBottom: `1px solid ${V.border}`, flexShrink: 0 }}>
          <span style={{ color: V.fgSoft }}>{I.Tag(16)}</span>
          <span style={{ fontSize: 15, fontWeight: 600 }}>选择标签 | 当前分类: {CATEGORIES.find(c => c.id === catId)?.name || ""}</span>
          <span style={{ fontSize: 12, color: V.fgMuted }}>已选 {selArr.length} 个</span>
          <span style={{ flex: 1 }} />
          <button onClick={onClose} style={{ ...btnStyle("ghost"), padding: 6, borderRadius: 6 }}>{I.X(16)}</button>
        </div>

        <div style={{ padding: "10px 16px", borderBottom: `1px solid ${V.border}`, flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 12px", border: `1px solid ${V.border}`, borderRadius: V.r }}>
            <span style={{ color: V.fgMuted }}>{I.Search(14)}</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜索标签 / 二级组 / 一级组..."
              style={{ flex: 1, border: "none", outline: "none", fontSize: 13, fontFamily: font, color: V.fg, background: "transparent" }} />
            {search && <button onClick={() => setSearch("")} style={{ ...btnStyle("ghost"), padding: 2 }}>{I.X(12)}</button>}
          </div>
        </div>

        {selArr.length > 0 && (
          <div style={{ padding: "8px 16px", borderBottom: `1px solid ${V.border}`, flexShrink: 0, display: "flex", flexWrap: "wrap", gap: 4, maxHeight: 64, overflowY: "auto" }}>
            {selArr.map(id => {
              const t = tagById(id); return t ? (
                <span key={id} onClick={() => toggle(id)} style={{ display: "inline-flex", alignItems: "center", gap: 3, cursor: "pointer", padding: "3px 8px", borderRadius: V.rFull, fontSize: 12, fontWeight: 500, background: V.primary, color: V.primaryFg }}>{t.name} {I.X(10)}</span>
              ) : null;
            })}
          </div>
        )}

        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          {!sRes && (
            <div style={{ width: 180, flexShrink: 0, borderRight: `1px solid ${V.border}`, overflowY: "auto", background: V.muted }}>
              {filteredDims.map(dim => {
                const isA = ag === dim.id; const cnt = cntG(dim.id);
                return (
                  <div key={dim.id} onClick={() => setAg(dim.id)} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "12px 14px", cursor: "pointer", fontSize: 13,
                    fontWeight: isA ? 600 : 400, color: isA ? V.fg : V.fgSoft,
                    background: isA ? V.bg : "transparent",
                    borderRight: isA ? `2px solid ${V.primary}` : "2px solid transparent",
                  }}
                    onMouseEnter={e => { if (!isA) e.currentTarget.style.background = "#F3F4F6"; }}
                    onMouseLeave={e => { if (!isA) e.currentTarget.style.background = "transparent"; }}
                  >
                    <span style={{ flex: 1 }}>{dim.name}{dim.isRequired && <span style={{ color: V.destructive, marginLeft: 2 }}>*</span>}</span>
                    {cnt > 0 && <span style={{ fontSize: 10, fontWeight: 600, padding: "0 6px", borderRadius: V.rFull, minWidth: 18, textAlign: "center", background: V.primary, color: V.primaryFg, lineHeight: "18px" }}>{cnt}</span>}
                  </div>
                );
              })}
            </div>
          )}

          <div style={{ flex: 1, overflowY: "auto", padding: sRes ? 0 : "12px 16px", background: V.bg }}>
            {sRes ? (
              sRes.length === 0 ? <div style={{ padding: 40, textAlign: "center", color: V.fgMuted, fontSize: 13 }}>没有匹配的标签</div>
                : sRes.map(t => {
                  const s = sel.has(t.id); return (
                    <div key={t.id} onClick={() => toggle(t.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 18px", cursor: "pointer", borderBottom: `1px solid #f1f5f9` }}
                      onMouseEnter={e => e.currentTarget.style.background = V.muted}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                    ><ModalCBox on={s} onClick={() => { }} /><span style={{ fontSize: 13, color: s ? V.fg : V.fgSoft, fontWeight: s ? 500 : 400 }}>{t.name}</span><span style={{ fontSize: 11, color: V.fgMuted, marginLeft: "auto", fontFamily: mono }}>{t.dName} / {t.gName}</span></div>
                  );
                })
            ) : activeDim ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {activeDim.groups.map(sg => {
                  const sgCnt = (sg.tagObjs ?? []).filter(t => sel.has(t.id)).length;
                  return (
                    <div key={sg.id} style={{ border: `1px solid ${V.border}`, borderRadius: V.r }}>
                      <div style={{ padding: "8px 12px", borderBottom: `1px solid ${V.border}`, background: V.muted, display: "flex", alignItems: "center", gap: 8, borderTopLeftRadius: V.r, borderTopRightRadius: V.r }}>
                        <span style={{ fontSize: 13, fontWeight: 600 }}>{sg.name}</span>
                        <span style={{ fontSize: 11, color: V.fgMuted }}>{sgCnt}/{(sg.tagObjs ?? []).length}</span>
                        <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
                          <button onClick={() => { const ns = new Set(sel); sg.tagObjs.forEach(t => ns.add(t.id)); setSel(ns); }} style={{ ...btnStyle("ghost"), fontSize: 11, padding: "2px 6px", color: V.blue }}>全选</button>
                          <button onClick={() => { const ns = new Set(sel); sg.tagObjs.forEach(t => ns.delete(t.id)); setSel(ns); }} style={{ ...btnStyle("ghost"), fontSize: 11, padding: "2px 6px", color: V.fgMuted }}>清空</button>
                        </div>
                      </div>
                      <div style={{ padding: "10px", display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 8 }}>
                        {(sg.tagObjs ?? []).map(t => {
                          const s = sel.has(t.id); return (
                            <div key={t.id} onClick={() => toggle(t.id)} className="hover-tag" style={{ display: "flex", alignItems: "flex-start", gap: 8, cursor: "pointer", fontSize: 13, color: V.fg }}>
                              <ModalCBox on={s} onClick={() => { }} size={16} />
                              <span style={{ paddingTop: 1, userSelect: "none", color: s ? V.fg : V.fgSoft, fontWeight: s ? 500 : 400 }}>{t.name}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : null}
          </div>
        </div>

        <div style={{ padding: "12px 16px", borderTop: `1px solid ${V.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          <button onClick={() => setSel(new Set())} style={{ ...btnStyle("ghost"), fontSize: 12, color: V.destructive }}>清除全部</button>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onClose} style={btnStyle("outline")}>取消</button>
            <button onClick={() => onConfirm(selArr)} style={btnStyle("default")}>确认 ({selArr.length})</button>
          </div>
        </div>
      </div>
    </div>
  );
}

//  pages.js — 主界面页面级组件
//  职责：TagSidebar（标签筛选侧栏）、DetailPanel（资产详情面板）
//  依赖：data.js（TAG_DIMS, CATEGORIES, ENTITIES, tagById）、
//        theme.js（V, I, font, mono, fmtSz, btnStyle）、
//        components.js（CBox, Badge, TagModal）
//  被依赖：app.js（App 组件渲染 TagSidebar 和 DetailPanel）

// ── TagSidebar (标签筛选侧栏) ───────────────────────────
/**
 * 三级树形标签筛选侧栏（维度→组→标签），支持搜索、折叠、多选
 * @param {string|null} activeCat - 当前激活的类别 ID，null 表示全部
 * @param {Set} selectedTags - 已选中的标签 ID 集合
 * @param {function} onToggle - 切换单个标签的选中状态，参数为 tagId
 * @param {function} onClear - 清除所有已选标签
 * @param {function} onHide - 隐藏侧栏回调
 */
function TagSidebar({ activeCat, selectedTags, onToggle, onClear, onHide }) {
  // 默认只展开第一个维度，其余折叠（i !== 0 表示非首维度）
  const [cDims, setCDims] = useState(() => {
    const init = {};
    TAG_DIMS.forEach((d, i) => { if (i !== 0) init[d.id] = true; });
    return init;
  });
  // 默认只展开第一个维度的第一个组，其余折叠
  const [cGrps, setCGrps] = useState(() => {
    const init = {};
    TAG_DIMS.forEach((d, i) => {
      d.groups.forEach((g, j) => { if (i !== 0 || j !== 0) init[g.id] = true; });
    });
    return init;
  });
  const [q, setQ] = useState("");
  const ql = q.toLowerCase();
  const dimCnt = dim => { let c = 0; (dim.groups ?? []).forEach(g => (g.tagObjs ?? []).forEach(t => { if (selectedTags.has(t.id)) c++; })); return c; };
  const grpCnt = g => (g.tagObjs ?? []).filter(t => selectedTags.has(t.id)).length;
  const filteredDims = useMemo(() => activeCat ? TAG_DIMS.filter(d => d.catId === activeCat) : TAG_DIMS, [activeCat]);

  return (
    <div style={{ width: 260, flexShrink: 0, borderRight: `1px solid ${V.border}`, display: "flex", flexDirection: "column", background: V.bg, overflow: "hidden" }}>
      <div style={{ flexShrink: 0, padding: "12px 14px", borderBottom: `1px solid ${V.border}`, display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ color: V.fgSoft }}>{I.Filter(15)}</span>
          <span style={{ fontSize: 14, fontWeight: 600 }}>标签筛选</span>
          {onHide && (
            <button onClick={onHide} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: V.fgMuted, display: "flex", alignItems: "center", justifyContent: "center", padding: 4, borderRadius: 4 }}
              onMouseEnter={e => e.currentTarget.style.background = V.muted}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}
            >
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>
            </button>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", border: `1px solid ${V.border}`, borderRadius: 6, background: V.muted }}>
          <span style={{ color: V.fgMuted }}>{I.Search(12)}</span>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="搜索标签..."
            style={{ flex: 1, border: "none", outline: "none", fontSize: 12, fontFamily: font, color: V.fg, background: "transparent" }} />
          {q && <span onClick={() => setQ("")} style={{ cursor: "pointer", color: V.fgMuted, display: "flex" }}>{I.X(10)}</span>}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "4px 0" }}>
        {filteredDims.map(dim => {
          const fGroups = ql ? dim.groups.map(g => ({ ...g, tagObjs: (g.tagObjs ?? []).filter(t => t.name.toLowerCase().includes(ql) || g.name.toLowerCase().includes(ql) || dim.name.toLowerCase().includes(ql)) })).filter(g => (g.tagObjs ?? []).length > 0) : dim.groups;
          if (ql && fGroups.length === 0) return null;
          const isDC = cDims[dim.id] && !ql; const dc = dimCnt(dim);
          return <div key={dim.id}>
            <div onClick={() => setCDims(p => ({ ...p, [dim.id]: !p[dim.id] }))} className="hover-dim" style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", cursor: "pointer", background: V.muted, borderBottom: `1px solid ${V.border}`, borderTop: `1px solid ${V.border}`, marginTop: -1 }}>
              <span style={{ transform: isDC ? "rotate(-90deg)" : "none", transition: "transform .12s", color: V.fgMuted, flexShrink: 0 }}>{I.ChevD(10)}</span>
              <span style={{ flex: 1, fontSize: 13, fontWeight: 700, color: V.fg }}>{dim.name}</span>
              {dc > 0 && <span style={{ fontSize: 9, fontWeight: 600, padding: "0 5px", borderRadius: V.rFull, background: V.blue, color: "#fff", lineHeight: "16px", minWidth: 16, textAlign: "center" }}>{dc}</span>}
            </div>
            {!isDC && fGroups.map(g => {
              const isGC = cGrps[g.id] && !ql; const gc = grpCnt(g);
              return <div key={g.id}>
                <div onClick={() => setCGrps(p => ({ ...p, [g.id]: !p[g.id] }))} className="hover-group" style={{ display: "flex", alignItems: "center", gap: 5, padding: "6px 14px 6px 26px", cursor: "pointer" }}>
                  <span style={{ transform: isGC ? "rotate(-90deg)" : "none", transition: "transform .12s", color: V.fgMuted, flexShrink: 0 }}>{I.ChevD(9)}</span>
                  <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: V.fgSoft }}>{g.name}</span>
                  <span style={{ fontSize: 10, color: V.fgMuted, fontFamily: mono, flexShrink: 0 }}>{(g.tagObjs ?? []).length}</span>
                  {gc > 0 && <span style={{ fontSize: 8, fontWeight: 600, padding: "0 4px", borderRadius: V.rFull, background: V.blue, color: "#fff", lineHeight: "14px", minWidth: 14, textAlign: "center", flexShrink: 0 }}>{gc}</span>}
                </div>
                {!isGC && <div style={{ padding: "0 14px 2px 40px" }}>{(g.tagObjs ?? []).map(t => {
                  const on = selectedTags.has(t.id);
                  return <div key={t.id} onClick={() => onToggle(t.id)} className="hover-tag" style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 6px", cursor: "pointer", borderRadius: 4, fontSize: 12, color: on ? V.fg : V.fgSoft, fontWeight: on ? 500 : 400 }}>
                    <CBox on={on} onClick={() => { }} size={14} /><span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.name}</span>
                  </div>;
                })}</div>}
              </div>;
            })}
          </div>;
        })}
      </div>
    </div>
  );
}

// ── DetailPanel (资产详情面板) ───────────────────────────
/**
 * 资产详情面板，展示预览（支持全屏）、基本信息、标签编辑、下载/删除操作
 * @param {Asset} asset - 当前选中的资产对象
 * @param {function} onClose - 关闭面板回调
 * @param {function} onUpdate - 更新资产回调，参数为修改后的 asset 对象
 * @param {function} onDelete - 删除资产回调，参数为 asset.id
 */
function DetailPanel({ asset, onClose, onUpdate, onDelete }) {
  const [tagOpen, setTagOpen] = useState(false);
  const [fullScreen, setFullScreen] = useState(false);
  const [mediaUrl, setMediaUrl] = useState("");

  useEffect(() => {
    if (asset && asset.file && (asset.file instanceof Blob || asset.file instanceof File)) {
      const url = URL.createObjectURL(asset.file);
      setMediaUrl(url);
      return () => URL.revokeObjectURL(url);
    } else {
      setMediaUrl("");
    }
  }, [asset]);

  if (!asset) return null;
  const cat = CATEGORIES.find(c => c.id === asset.catId);
  const ent = ENTITIES.find(e => e.id === asset.entId);

  const handleDownload = () => {
    if (mediaUrl) {
      const a = document.createElement('a');
      a.href = mediaUrl;
      a.download = asset.file?.name || asset.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } else {
      alert('演示数据无法下载');
    }
  };

  return (
    <div style={{ width: 340, flexShrink: 0, borderLeft: `1px solid ${V.border}`, background: V.bg, display: "flex", flexDirection: "column", overflowY: "auto", animation: "panelSlide .2s ease" }}>
      <div style={{ padding: "14px 16px", display: "flex", alignItems: "center", gap: 8, borderBottom: `1px solid ${V.border}` }}>
        <span style={{ fontSize: 14, fontWeight: 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>资产详情</span>
        <button onClick={onClose} className="hover-detail-close" style={{ background: "none", border: "none", cursor: "pointer", color: V.fgMuted, display: "flex", padding: 4, borderRadius: 6 }}>{I.X(16)}</button>
      </div>
      <div onClick={() => setFullScreen(true)} style={{ position: "relative", aspectRatio: "4/3", background: asset.color || V.muted, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", overflow: "hidden" }}>
        {mediaUrl ? (
          asset.type === "image" ? (
            <img src={mediaUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          ) : (
            <video src={mediaUrl} muted style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          )
        ) : (
          <>
            {asset.type === "video" && <div style={{ width: 48, height: 48, borderRadius: V.rFull, background: "rgba(0,0,0,.5)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>{I.Play(24)}</div>}
            {asset.type === "image" && <span style={{ color: "rgba(0,0,0,.15)", fontSize: 48 }}>{I.Img(48)}</span>}
          </>
        )}
        <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0)", transition: "background .2s" }} onMouseEnter={e => e.currentTarget.style.background = "rgba(0,0,0,0.1)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(0,0,0,0)"} />
        <span style={{ position: "absolute", top: 8, right: 8, padding: "2px 8px", borderRadius: V.rFull, fontSize: 11, fontWeight: 500, fontFamily: mono, background: "rgba(255,255,255,.9)", color: V.fgSoft, zIndex: 2 }}>{asset.type}</span>
      </div>
      <div style={{ padding: "12px 16px", display: "flex", gap: 8, borderBottom: `1px solid ${V.border}` }}>
        <button onClick={handleDownload} style={{ ...btnStyle("outline"), flex: 1, fontSize: 13, gap: 6, color: V.fg, borderColor: V.border }}>
          {I.Download(14)} 下载
        </button>
        <button onClick={() => { if (window.confirm("确定要删除该资产吗？")) onDelete(asset.id); }} style={{ ...btnStyle("outline"), flex: 1, fontSize: 13, gap: 6, color: V.destructive, borderColor: "rgba(239, 68, 68, 0.3)", background: "rgba(239, 68, 68, 0.05)" }}>
          {I.Trash(14)} 删除
        </button>
      </div>
      <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
        <div>
          <div style={{ fontSize: 15, fontWeight: 600, color: V.fg, marginBottom: 4, wordBreak: "break-all" }}>{asset.name}</div>
          <div style={{ display: "flex", gap: 12, fontSize: 12, color: V.fgMuted, fontFamily: mono }}><span>{fmtSz(asset.size)}</span><span>{asset.date}</span></div>
        </div>
        <div>
          <div style={{ fontSize: 12, fontWeight: 500, color: V.fgMuted, marginBottom: 6 }}>类别</div>
          {cat ? <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: V.rFull, fontSize: 13, fontWeight: 500, background: V.amberBg, color: "#92400E" }}>{cat.icon} {cat.name}</span> : <span style={{ fontSize: 13, color: V.fgMuted }}>未分类</span>}

        </div>

      </div>
      {tagOpen && <TagModal catId={asset.catId} selected={asset.tags} onConfirm={t => { onUpdate({ ...asset, tags: t }); setTagOpen(false); }} onClose={() => setTagOpen(false)} />}

      {fullScreen && (
        <div style={{ position: "fixed", inset: 0, zIndex: 10000, background: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn .2s ease" }} onClick={() => setFullScreen(false)}>
          <button style={{ position: "absolute", top: 20, right: 20, background: "rgba(255,255,255,.1)", border: "none", color: "#fff", padding: 8, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setFullScreen(false)}>
            {I.X(24)}
          </button>
          <div onClick={e => e.stopPropagation()} style={{ maxWidth: "90%", maxHeight: "90%", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {mediaUrl ? (
              asset.type === "image" ? (
                <img src={mediaUrl} style={{ maxWidth: "100%", maxHeight: "90vh", objectFit: "contain", borderRadius: 8 }} />
              ) : (
                <video src={mediaUrl} controls autoPlay style={{ maxWidth: "100%", maxHeight: "90vh", objectFit: "contain", borderRadius: 8 }} />
              )
            ) : (
              <div style={{ color: "rgba(255,255,255,.5)", fontSize: 16, display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
                {asset.type === "image" ? <span style={{ fontSize: 64 }}>{I.Img(64)}</span> : <span style={{ fontSize: 64 }}>{I.Vid(64)}</span>}
                演示数据无真实文件可预览

            )}

        </div>
      )}
    </div>
  );
}

// ── UploadApp (上传主界面) ───────────────────────────────
/**
 * 上传主界面，支持拖拽/选择文件及文件夹，管理待上传资产列表
 * @param {function} onUpload - 确认上传回调，参数为 Asset[] 数组
 * @param {function} onClose - 关闭上传界面回调
 * 副作用：上传成功后通过 onUpload 将资产添加到 App 的 assets state
 */
function UploadApp({ onUpload, onClose }) {
  const [assets, setAssets] = useState([]);
  const [entities, setEntities] = useState(ENTITIES);
  const [drag, setDrag] = useState(false);
  const [done, setDone] = useState(false);
  const fileRef = useRef(null);
  const folderRef = useRef(null);

  const addFiles = useCallback(files => {
    const v = Array.from(files).filter(isValid);
    if (v.length) setAssets(p => [...p, ...v.map(f => ({ id: uid(), file: f, catId: "scene", tags: [], entId: null }))]);
  }, []);

  const handleDrop = useCallback(async (e) => {
    e.preventDefault(); setDrag(false);
    const items = e.dataTransfer.items;
    if (items) {
      const allFiles = [];
      const promises = [];
      for (let i = 0; i < items.length; i++) {
        const entry = items[i].webkitGetAsEntry?.();
        if (entry) {
          promises.push(readEntries(entry).then(fs => allFiles.push(...fs)));
        } else {
          const f = items[i].getAsFile();
          if (f && isValid(f)) allFiles.push(f);
        }
      }
      await Promise.all(promises);
      if (allFiles.length) addFiles(allFiles);
    } else {
      addFiles(e.dataTransfer.files);
    }
  }, [addFiles]);

  const imgC = assets.filter(a => ft(a.file) === "image").length;
  const vidC = assets.filter(a => ft(a.file) === "video").length;

  return (
    <div style={{ height: "100%", width: "100%", overflowY: "auto", position: "relative", fontFamily: font, color: V.fg, background: "#FAFAFA" }}>
      <div style={{ maxWidth: 860, margin: "0 auto", padding: "48px 24px 80px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 32 }}>
          <div>
            <h1 style={{ margin: "0 0 6px", fontSize: 28, fontWeight: 700, letterSpacing: -.5 }}>资产上传</h1>
            <p style={{ margin: 0, fontSize: 14, color: V.fgMuted }}>上传图片或视频，支持文件与文件夹</p>
          </div>
          <button onClick={onClose} style={{ ...btnStyle("ghost"), padding: "6px 14px" }}>{I.X(16)} 关闭</button>
        </div>

        {done && (
          <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", zIndex: 10000, background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.r, padding: "12px 24px", display: "flex", alignItems: "center", gap: 8, boxShadow: V.shLg, animation: "slideD .25s ease" }}>
            <span style={{ color: V.green }}>{I.Check(16)}</span>
            <span style={{ fontSize: 14, fontWeight: 500 }}>上传成功</span>
          </div>
        )}

        <div onDragOver={e => { e.preventDefault(); setDrag(true); }} onDragLeave={() => setDrag(false)} onDrop={handleDrop}
          style={{
            borderRadius: V.rLg, padding: assets.length ? "24px 0" : "44px 0",
            border: `2px dashed ${drag ? V.ring : V.border}`,
            background: drag ? V.blueBg : V.bg, textAlign: "center",
            transition: "all .2s", marginBottom: 24, cursor: "default",
          }}>
          <input ref={fileRef} type="file" multiple accept="image/*,video/*" style={{ display: "none" }}
            onChange={e => { addFiles(e.target.files); e.target.value = ""; }} />
          <input ref={folderRef} type="file" multiple style={{ display: "none" }}
            onChange={e => { addFiles(e.target.files); e.target.value = ""; }}
            {...{ webkitdirectory: "", mozdirectory: "", directory: "" }} />
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, color: drag ? V.blue : V.fgMuted }}>
            <div style={{ width: 48, height: 48, borderRadius: V.rLg, display: "flex", alignItems: "center", justifyContent: "center", background: drag ? "#DBEAFE" : V.muted, border: `1px solid ${drag ? "#93C5FD" : V.border}` }}>{I.Upload(22)}</div>
            <div>
              <p style={{ margin: 0, fontSize: 14, fontWeight: 500, color: drag ? V.blue : V.fgSoft }}>拖拽文件或文件夹到此处</p>
              <p style={{ margin: "4px 0 0", fontSize: 12, color: V.fgMuted }}>JPG, PNG, GIF, WEBP, MP4, MOV — 自动过滤非媒体文件</p>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <button onClick={() => fileRef.current?.click()} style={btnStyle("outline")}>{I.Upload(14)} 选择文件</button>
              <button onClick={() => folderRef.current?.click()} style={btnStyle("outline")}>{I.Folder(14)} 选择文件夹</button>
            </div>
          </div>
        </div>

        {assets.length > 0 && !done && (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
              <span style={{ fontSize: 15, fontWeight: 600 }}>已选择 <span style={{ color: V.blue }}>{assets.length}</span> 个文件</span>
              <div style={{ display: "flex", gap: 6 }}>
                {imgC > 0 && <Badge color={V.blue} bg={V.blueBg}>{I.Img(11)} {imgC} 图片</Badge>}
                {vidC > 0 && <Badge color={V.amber} bg={V.amberBg}>{I.Vid(11)} {vidC} 视频</Badge>}
              </div>
              <span style={{ fontSize: 12, color: V.fgMuted, fontFamily: mono }}>{fmtSz(assets.reduce((s, a) => s + a.file.size, 0))}</span>
            </div>

            {assets.length >= 2 && (
              <div style={{ marginBottom: 20 }}>
                <BatchBar
                  onApplyCat={c => setAssets(p => p.map(a => ({ ...a, catId: c })))}
                  onApplyTags={tg => setAssets(p => p.map(a => ({ ...a, tags: Array.from(new Set([...a.tags, ...tg])) })))}
                />
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {assets.map(a => (
                <AssetCard key={a.id} asset={a} entities={entities}
                  onUpdate={u => setAssets(p => p.map(x => x.id === u.id ? u : x))}
                  onRemove={() => setAssets(p => p.filter(x => x.id !== a.id))}
                  onNewEntity={en => setEntities(p => [...p, en])} />
              ))}
            </div>

            <div style={{ marginTop: 24, display: "flex", justifyContent: "flex-end", gap: 10 }}>
              <button onClick={() => setAssets([])} style={btnStyle("outline")}>取消</button>
              <button onClick={() => {
                // 校验必选维度：每个 isRequired 维度下至少要有一个标签被选中
                const errorMsgs = [];
                for (const a of assets) {
                  const catId = a.catId || "scene"; // 未选类别时默认归入"场景"
                  const reqDims = TAG_DIMS.filter(d => d.catId === catId && d.isRequired);
                  const missingDims = reqDims.filter(dim => !(a.tags ?? []).some(tid => tagById(tid)?.dId === dim.id));
                  if (missingDims.length > 0) {
                    errorMsgs.push(`"${a.file.name}" 缺少必选标签: ${missingDims.map(d => d.name).join('、')}`);
                  }
                }
                if (errorMsgs.length > 0) {
                  alert("部分资产未选择必选标签：\n\n" + errorMsgs.slice(0, 5).join("\n") + (errorMsgs.length > 5 ? `\n...等 ${errorMsgs.length} 个资产` : ""));
                  return;
                }
                if (onUpload) {
                  onUpload(assets.map(a => ({
                    id: a.id, name: a.file.name, type: ft(a.file),
                    catId: a.catId || "scene", tags: a.tags, entId: a.entId,
                    size: a.file.size,
                    date: new Date().toISOString().slice(0, 10),
                    color: CL[Math.floor(Math.random() * CL.length)]
                  })));
                  setDone(true); setTimeout(() => { setDone(false); setAssets([]); onClose?.(); }, 800);
                } else {
                  setDone(true); setTimeout(() => { setDone(false); setAssets([]); }, 2000);
                }
              }} style={btnStyle("default")}>上传 {assets.length} 个资产</button>
            </div>
          </>
        )}

        {assets.length === 0 && !done && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
            {[
              { icon: I.Folder(20), title: "类别", desc: "场景、角色、生物、道具。每个资产归属唯一一个类别。", color: V.amber, bg: V.amberBg },
              { icon: I.Tag(20), title: "标签", desc: "标签组+标签两级结构，弹窗选择，按维度分组，自由多选。", color: V.blue, bg: V.blueBg },
              { icon: I.Folder(20), title: "文件夹上传", desc: "支持拖拽或选择整个文件夹，自动递归提取所有图片和视频文件。", color: V.green, bg: V.greenBg },
            ].map(c => (
              <div key={c.title} style={{ background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.rLg, padding: 24, boxShadow: V.sh }}>
                <div style={{ width: 40, height: 40, borderRadius: V.r, display: "flex", alignItems: "center", justifyContent: "center", background: c.bg, color: c.color, marginBottom: 14 }}>{c.icon}</div>
                <h3 style={{ margin: "0 0 6px", fontSize: 15, fontWeight: 600 }}>{c.title}</h3>
                <p style={{ margin: 0, fontSize: 13, color: V.fgMuted, lineHeight: 1.5 }}>{c.desc}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

//  依赖：data.js（CATEGORIES, TAG_DIMS, rebuildTags）、theme.js（V, I, btnStyle）

// ── SettingsModal (系统设置弹窗) ─────────────────────────
/**
 * 系统设置弹窗，包含类别管理和标签维度树管理两个 Tab
 * @param {function} onClose - 关闭弹窗回调
 * @param {function} onSave - 保存后通知父组件刷新的回调
 */
function SettingsModal({ onClose, onSave }) {
  const [tab, setTab] = useState("cat");
  const [cats, setCats] = useState(() => JSON.parse(JSON.stringify(CATEGORIES)));
  const [dims, setDims] = useState(() => JSON.parse(JSON.stringify(TAG_DIMS)));
  const [activeCat, setActiveCat] = useState(() => CATEGORIES[0]?.id || null);
  const [collapsedDims, setCollapsedDims] = useState({});

  const save = () => {
    CATEGORIES = cats;
    TAG_DIMS = dims;
    rebuildTags(TAG_DIMS);
    onSave();
    onClose();
  };

  const addCat = () => {
    const id = "c" + Date.now();
    setCats([...cats, { id, name: "新类别", icon: "📦" }]);
  };
  const updateCat = (id, name) => setCats(cats.map(c => c.id === id ? { ...c, name } : c));

  const addDim = (catId) => {
    if (!catId) return;
    const id = "d" + Date.now();
    setDims([...dims, { id, catId, name: "新标签维度", groups: [] }]);
  };
  const updateDim = (id, name) => setDims(dims.map(d => d.id === id ? { ...d, name } : d));
  const toggleDimRequired = (id) => setDims(dims.map(d => d.id === id ? { ...d, isRequired: !d.isRequired } : d));

  const addGrp = (dimId) => {
    const id = "g" + Date.now();
    setDims(dims.map(d => {
      if (d.id === dimId) return { ...d, groups: [...d.groups, { id, name: "新标签组", tags: [] }] };
      return d;
    }));
    setTimeout(() => {
      const el = document.getElementById("grp-" + id);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 100);
  };
  const updateGrp = (dimId, grpId, name) => {
    setDims(dims.map(d => {
      if (d.id === dimId) return { ...d, groups: d.groups.map(g => g.id === grpId ? { ...g, name } : g) };
      return d;
    }));
  };

  const addTagName = (dimId, grpId) => {
    const name = window.prompt("请输入新标签名称：");
    if (!name || !name.trim()) return;
    setDims(dims.map(d => {
      if (d.id === dimId) {
        return {
          ...d, groups: d.groups.map(g => {
            if (g.id === grpId) {
              if (g.tags.includes(name.trim())) return g;
              return { ...g, tags: [...g.tags, name.trim()] };
            }
            return g;
          })
        };
      }
      return d;
    }));
  };
  const updateTagName = (dimId, grpId, oldName) => {
    const name = window.prompt("请修改标签名称：", oldName);
    if (!name || !name.trim() || name.trim() === oldName) return;
    setDims(dims.map(d => {
      if (d.id === dimId) {
        return {
          ...d, groups: d.groups.map(g => {
            if (g.id === grpId) return { ...g, tags: g.tags.map(t => t === oldName ? name.trim() : t) };
            return g;
          })
        };
      }
      return d;
    }));
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9999, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn 0.2s ease" }}>
      <div style={{ width: 800, height: "80%", background: V.bg, borderRadius: V.rLg, overflow: "hidden", display: "flex", flexDirection: "column", boxShadow: V.shLg }}>
        <div style={{ padding: "16px 24px", borderBottom: `1px solid ${V.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <h2 style={{ margin: 0, fontSize: 18, color: V.fg }}>系统设置</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: V.fgMuted }}>{I.X(20)}</button>
        </div>

        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          <div style={{ width: 160, borderRight: `1px solid ${V.border}`, background: V.bg, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            <button onClick={() => setTab("cat")} style={{ padding: "10px 14px", textAlign: "left", borderRadius: V.r, border: "none", background: tab === "cat" ? V.blueBg : "transparent", color: tab === "cat" ? V.blue : V.fgSoft, cursor: "pointer", fontWeight: tab === "cat" ? 600 : 400 }}>类别管理</button>
            <button onClick={() => setTab("tag")} style={{ padding: "10px 14px", textAlign: "left", borderRadius: V.r, border: "none", background: tab === "tag" ? V.blueBg : "transparent", color: tab === "tag" ? V.blue : V.fgSoft, cursor: "pointer", fontWeight: tab === "tag" ? 600 : 400 }}>标签树管理</button>
          </div>

          <div style={{ flex: 1, padding: 24, overflowY: "auto", background: V.muted }}>
            {tab === "cat" ? (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <h3 style={{ margin: 0, fontSize: 16, color: V.fg }}>所有类别</h3>
                  <button onClick={addCat} style={{ ...btnStyle("outline"), padding: "6px 14px" }}>{I.Plus(14)} 添加类别</button>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {cats.map(c => (
                    <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.r, boxShadow: V.sh }}>
                      <span style={{ fontSize: 20 }}>{c.icon}</span>
                      <input value={c.name} onChange={e => updateCat(c.id, e.target.value)} style={{ flex: 1, border: `1px solid transparent`, padding: "6px 10px", borderRadius: 6, fontSize: 14, outline: "none" }} placeholder="类别名称" onFocus={e => e.target.style.border = `1px solid ${V.border}`} onBlur={e => e.target.style.border = "1px solid transparent"} />
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div>
                <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                  <select value={activeCat || ""} onChange={e => setActiveCat(e.target.value)} style={{ padding: "8px 12px", border: `1px solid ${V.border}`, borderRadius: V.r, fontSize: 14, outline: "none", minWidth: 140 }}>
                    {cats.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                  </select>
                  <button onClick={() => addDim(activeCat)} style={{ ...btnStyle("outline"), padding: "6px 14px" }}>{I.Plus(14)} 添加标签维度</button>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  {dims.filter(d => d.catId === activeCat).map((d, dIdx) => (
                    <div key={d.id} style={{ background: V.bg, border: `1px solid ${V.border}`, borderRadius: V.r, overflow: "hidden", boxShadow: V.sh }}>
                      <div style={{ padding: "10px 14px", background: V.muted, borderBottom: collapsedDims[d.id] ? "none" : `1px solid ${V.border}`, display: "flex", gap: 8, alignItems: "center" }}>
                        <span onClick={() => setCollapsedDims(p => ({ ...p, [d.id]: !p[d.id] }))} style={{ cursor: "pointer", display: "flex", alignItems: "center", color: V.fgMuted, transform: collapsedDims[d.id] ? "rotate(-90deg)" : "none", transition: "transform 0.15s" }}>{I.ChevD(12)}</span>
                        <span style={{ color: V.fgMuted, fontSize: 12 }}>#{dIdx + 1}</span>
                        <input value={d.name} onChange={e => updateDim(d.id, e.target.value)} style={{ flex: 1, fontWeight: 600, fontSize: 14, border: `1px solid transparent`, padding: "4px 8px", background: "transparent", borderRadius: 4, outline: "none" }} onFocus={e => e.target.style.border = `1px solid ${V.border}`} onBlur={e => e.target.style.border = "1px solid transparent"} placeholder="维度名称" />
                        <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: V.fgSoft, cursor: "pointer", marginRight: 8, userSelect: "none" }}>
                          <input type="checkbox" checked={!!d.isRequired} onChange={() => toggleDimRequired(d.id)} style={{ cursor: "pointer" }} />
                          必选
                        </label>
                        <button onClick={() => { if (collapsedDims[d.id]) setCollapsedDims(p => ({ ...p, [d.id]: false })); addGrp(d.id); }} style={{ ...btnStyle("ghost"), fontSize: 12 }}>{I.Plus(12)} 添加组</button>
                      </div>
                      {!collapsedDims[d.id] && (
                        <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                          {d.groups.map((g, gIdx) => (
                            <div key={g.id} id={`grp-${g.id}`} style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <span style={{ width: 4, height: 4, borderRadius: "50%", background: V.fgMuted }} />
                                <input value={g.name} onChange={e => updateGrp(d.id, g.id, e.target.value)} style={{ fontSize: 13, color: V.fgSoft, border: `1px solid transparent`, padding: "4px 8px", background: "transparent", borderRadius: 4, outline: "none", width: 140 }} onFocus={e => e.target.style.border = `1px solid ${V.border}`} onBlur={e => e.target.style.border = "1px solid transparent"} placeholder="标签组名称" />
                                <button onClick={() => addTagName(d.id, g.id)} style={{ ...btnStyle("ghost"), fontSize: 11, padding: "2px 6px" }}>{I.Plus(10)} 标签</button>
                              </div>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, paddingLeft: 20 }}>
                                {g.tags.map((t, tIdx) => (
                                  <span key={tIdx} onClick={() => updateTagName(d.id, g.id, t)} style={{ cursor: "pointer", background: V.secondary, padding: "4px 10px", borderRadius: V.rFull, fontSize: 12, border: `1px solid ${V.border}`, color: V.fgSoft }} title="点击修改名称">{t}</span>
                                ))}
                                {g.tags.length === 0 && <span style={{ fontSize: 12, color: V.fgMuted, padding: "4px 0" }}>无标签</span>}
                              </div>
                            </div>
                          ))}
                          {d.groups.length === 0 && <div style={{ color: V.fgMuted, fontSize: 12 }}>尚无标签组</div>}
                        </div>
                      )}
                    </div>
                  ))}
                  {dims.filter(d => d.catId === activeCat).length === 0 && <div style={{ color: V.fgMuted, fontSize: 13, padding: 40, textAlign: "center" }}>该类别下暂无标签维度</div>}
                </div>
              </div>
            )}
          </div>
        </div>

        <div style={{ padding: "16px 24px", background: V.bg, borderTop: `1px solid ${V.border}`, display: "flex", justifyContent: "flex-end", gap: 12 }}>
          <button onClick={onClose} style={btnStyle("outline")}>取消</button>
          <button onClick={save} style={btnStyle("default")}>保存设置</button>
        </div>
      </div>
    </div>
  );
}

//  app.js — 根组件 + 渲染入口
//  职责：App 组件管理全局状态（资产列表、筛选、分页），组合所有页面组件
//  依赖：data.js（INITIAL_ASSETS, CATEGORIES, tagById）、theme.js（V, I, font, mono, fmtSz, btnStyle）、
//        components.js（Badge）、pages.js（TagSidebar, DetailPanel）、
//        upload.js（UploadModal）、settings.js（SettingsModal）
//  被依赖：无（本文件是入口，最后加载）
// ═══════════════════════════════════════════════════════════

/**
 * App — 根组件，管理全局状态并组合所有子页面
 * 入口：ReactDOM.createRoot 渲染
 * 输入：无 props（从全局 INITIAL_ASSETS 初始化）
 * 副作用：监听 'app_data_updated' 事件（由 SettingsModal 触发）以刷新视图
 */
function App() {
  const [assets, setAssets] = useState(INITIAL_ASSETS);         // 写: handleUpload, DetailPanel.onDelete/onUpdate | 读: filtered, selAsset, 类别Tab计数
  const [search, setSearch] = useState("");                      // 写: 顶栏搜索框 | 读: filtered
  const [activeCat, setActiveCat] = useState(null);              // 写: 类别Tab点击 | 读: filtered, TagSidebar
  const [selectedTags, setSelectedTags] = useState(new Set());   // 写: toggleTag, 清除按钮 | 读: filtered, TagSidebar, 筛选栏
  const [layoutMode, setLayoutMode] = useState("compact");       // 写: 布局切换按钮 | 读: 网格列数 ("compact"=多列, "wide"=3列)
  const [selected, setSelected] = useState(null);                // 写: 卡片点击, DetailPanel.onClose/onDelete | 读: selAsset, 卡片高亮
  const [showSidebar, setShowSidebar] = useState(true);          // 写: 筛选按钮, TagSidebar.onHide | 读: 侧栏显隐
  const [showUpload, setShowUpload] = useState(false);           // 写: 上传按钮, UploadModal.onClose | 读: UploadModal 显隐
  const [showSettings, setShowSettings] = useState(false);       // 写: 设置按钮, SettingsModal.onClose | 读: SettingsModal 显隐
  const [updateKey, setUpdateKey] = useState(0);                  // 写: SettingsModal.onSave | 触发 re-render 以响应全局数据变更
  const [page, setPage] = useState(1);                           // 写: 翻页按钮, 筛选条件变更时重置 | 读: visibleAssets 分页
  const [pageSize, setPageSize] = useState(50);                  // 写: 每页条数下拉 | 读: visibleAssets 分页

  const toggleTag = useCallback(id => { setSelectedTags(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; }); }, []);

  // 筛选+排序管线：类别 → 搜索 → 标签（维度间 AND，维度内 OR）→ 排序
  const filtered = useMemo(() => {
    let list = assets;
    if (activeCat) list = list.filter(a => a.catId === activeCat);
    if (search.trim()) { const q = search.toLowerCase(); list = list.filter(a => a.name.toLowerCase().includes(q)); }
    if (selectedTags.size > 0) {
      // 将选中标签按维度分组，实现"维度间 AND、维度内 OR"的筛选逻辑
      const tagsByDim = {};
      selectedTags.forEach(tid => {
        const t = tagById(tid);
        if (t) { tagsByDim[t.dId] = tagsByDim[t.dId] || []; tagsByDim[t.dId].push(tid); }
      });
      list = list.filter(a => {
        for (const dId in tagsByDim) {
          if (!tagsByDim[dId].some(tid => (a.tags ?? []).includes(tid))) return false;
        }
        return true;
      });
    }
    return [...list].sort((a, b) => b.date.localeCompare(a.date));
  }, [assets, activeCat, search, selectedTags]);

  useEffect(() => { setPage(1); }, [activeCat, search, selectedTags]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const currentPage = Math.max(1, Math.min(page, totalPages));
  const visibleAssets = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

  const selAsset = selected ? assets.find(a => a.id === selected) : null;

  const handleUpload = (newAssets) => {
    setAssets(prev => [...newAssets, ...prev]);
  };

  return (
    <div style={{ minHeight: "100vh", fontFamily: font, color: V.fg, background: "#FAFAFA", display: "flex", flexDirection: "column" }}>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Top bar */}
      <div style={{ background: V.bg, borderBottom: `1px solid ${V.border}`, padding: "0 24px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 32, height: 56 }}>
          <h1 style={{ fontSize: 18, fontWeight: 700, margin: 0, width: 204, flexShrink: 0 }}>资产库</h1>
          <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, padding: "9px 16px", border: `1px solid ${V.border}`, borderRadius: V.r, background: V.muted }}>
            <span style={{ color: V.fgMuted }}>{I.Search(15)}</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜索资产名称..." style={{ flex: 1, border: "none", outline: "none", fontSize: 14, fontFamily: font, color: V.fg, background: "transparent" }} />
            {search && <button onClick={() => setSearch("")} style={{ background: "none", border: "none", cursor: "pointer", color: V.fgMuted, display: "flex", padding: 0 }}>{I.X(15)}</button>}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginLeft: "auto" }}>
            <button onClick={() => setShowUpload(true)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: V.r, background: V.blue, color: "#fff", fontSize: 13, fontWeight: 500, border: "none", cursor: "pointer", boxShadow: V.sh }}>{I.Upload(16)} 上传资产</button>
            <button onClick={() => setShowSettings(true)} style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 32, height: 32, borderRadius: V.r, background: V.bg, color: V.fgSoft, fontSize: 13, fontWeight: 500, border: `1px solid ${V.border}`, cursor: "pointer", boxSizing: "border-box" }}>{I.Settings(16)}</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: 0, marginTop: -1 }}>
          {[{ id: null, name: "全部", icon: "" }, ...CATEGORIES].map(c => {
            const isA = activeCat === c.id; const count = c.id === null ? assets.length : assets.filter(a => a.catId === c.id).length;
            return <button key={c.id || "all"} onClick={() => setActiveCat(isA && c.id !== null ? null : c.id)} style={{ padding: "10px 18px", fontSize: 13, fontWeight: isA ? 600 : 400, color: isA ? V.fg : V.fgMuted, background: "none", border: "none", borderBottom: isA ? `2px solid ${V.primary}` : "2px solid transparent", cursor: "pointer", fontFamily: font, transition: "all .12s" }}>{c.icon}{c.icon ? " " : ""}{c.name} <span style={{ fontSize: 11, color: V.fgMuted, fontFamily: mono, marginLeft: 4 }}>{count}</span></button>;
          })}
        </div>
      </div>

      {selectedTags.size > 0 && (
        <div style={{ background: V.bg, borderBottom: `1px solid ${V.border}`, padding: "8px 24px", display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
          <span style={{ fontSize: 12, color: V.fgMuted, marginRight: 4 }}>筛选中:</span>
          {Array.from(selectedTags ?? []).map(tid => { const t = tagById(tid); return t ? <Badge key={tid} onRemove={() => toggleTag(tid)}>{t.name}</Badge> : null; })}
          <button onClick={() => setSelectedTags(new Set())} style={{ background: "none", border: "none", fontSize: 12, color: V.destructive, cursor: "pointer", fontFamily: font, marginLeft: 8 }}>清除全部</button>
        </div>
      )}

      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        {showSidebar && <TagSidebar activeCat={activeCat} selectedTags={selectedTags} onToggle={toggleTag} onClear={() => setSelectedTags(new Set())} onHide={() => setShowSidebar(false)} />}

        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 20px 0", flexShrink: 0 }}>
            <button onClick={() => setShowSidebar(!showSidebar)} style={{ display: "flex", alignItems: "center", gap: 6, height: 30, padding: "0 10px", border: `1px solid ${showSidebar ? V.primary : V.border}`, borderRadius: V.r, background: showSidebar ? V.primary : V.bg, color: showSidebar ? V.primaryFg : V.fgSoft, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: font, boxSizing: "border-box" }}>{I.Filter(13)} 筛选{selectedTags.size > 0 ? ` (${selectedTags.size})` : ""}</button>
            <div style={{ display: "flex", border: `1px solid ${V.border}`, borderRadius: V.r, overflow: "hidden", height: 30, boxSizing: "border-box" }}>
              {[["compact", I.Grid, "多列"], ["wide", null, "3列"]].map(([m, icon, label]) => <button key={m} onClick={() => setLayoutMode(m)} title={label} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4, padding: "0 10px", height: "100%", border: "none", cursor: "pointer", fontSize: 12, fontFamily: font, background: layoutMode === m ? V.primary : V.bg, color: layoutMode === m ? V.primaryFg : V.fgMuted }}>{icon ? icon(14) : <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" d="M3 5h18M3 12h18M3 19h18M8 5v14M16 5v14" /></svg>}{label}</button>)}
            </div>
            <div style={{ fontSize: 12, color: V.fgMuted, fontFamily: font, marginLeft: 6 }}>
              共 <span style={{ fontWeight: 600, color: V.fgSoft, fontFamily: mono }}>{filtered.length}</span> 条 &nbsp; 第 <span style={{ fontWeight: 600, color: V.fgSoft, fontFamily: mono }}>{currentPage}</span> / {totalPages} 页
            </div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
            {filtered.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: V.fgMuted }}>
                <div style={{ fontSize: 40, marginBottom: 12, opacity: .3 }}>{I.Search(40)}</div>
                <div style={{ fontSize: 15, fontWeight: 500 }}>没有找到匹配的资产</div>
                <div style={{ fontSize: 13, marginTop: 4 }}>尝试调整搜索关键词或筛选条件</div>
              </div>
            ) : (() => {
              const cardRatio = activeCat === "scene" ? "16/9" : activeCat === "character" ? "9/16" : "1/1";
              const cols = layoutMode === "wide" ? "repeat(3, 1fr)" : "repeat(auto-fill, minmax(180px, 1fr))";
              return (
                <div style={{ display: "grid", gridTemplateColumns: cols, gap: 14 }}>
                  {visibleAssets.map(a => {
                    const isSel = selected === a.id; const cat = CATEGORIES.find(c => c.id === a.catId);
                    return <div key={a.id} onClick={() => setSelected(isSel ? null : a.id)} className={`app-grid-card ${isSel ? 'sel' : ''}`} style={{ borderRadius: V.rLg, overflow: "hidden", cursor: "pointer", border: `2px solid ${isSel ? V.ring : V.border}`, background: V.bg, boxShadow: isSel ? `0 0 0 2px ${V.ring}33` : V.sh, transition: "all .15s" }}>
                      <div style={{ aspectRatio: cardRatio, background: a.color, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden" }}>
                        {a.type === "video" && <div style={{ width: 36, height: 36, borderRadius: V.rFull, background: "rgba(0,0,0,.4)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>{I.Play(18)}</div>}
                        {a.type === "image" && <span style={{ color: "rgba(0,0,0,.1)", fontSize: 32 }}>{I.Img(32)}</span>}
                        {cat && <span style={{ position: "absolute", top: 6, left: 6, padding: "1px 6px", borderRadius: V.rFull, fontSize: 10, background: "rgba(255,255,255,.85)", color: V.fgSoft, fontWeight: 500 }}>{cat.icon} {cat.name}</span>}
                      </div>
                      <div style={{ padding: "8px 10px" }}>
                        <div style={{ fontSize: 13, fontWeight: 500, color: V.fg, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.name}</div>
                      </div>
                    </div>;
                  })}
                </div>
              );
            })()}
            {filtered.length > 0 && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 0", marginTop: 16, borderTop: `1px solid ${V.border}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 13, color: V.fgMuted }}>共 {filtered.length} 个资产</span>
                  <select value={pageSize} onChange={e => { setPageSize(Number(e.target.value)); setPage(1); }} style={{ padding: "4px 8px", border: `1px solid ${V.border}`, borderRadius: V.r, fontSize: 13, fontFamily: font, color: V.fgSoft, background: V.bg, outline: "none", cursor: "pointer" }}>
                    <option value={30}>30 条/页</option>
                    <option value={50}>50 条/页</option>
                    <option value={100}>100 条/页</option>
                  </select>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} style={{ ...btnStyle("outline"), padding: "4px 12px", opacity: currentPage === 1 ? 0.5 : 1, cursor: currentPage === 1 ? "not-allowed" : "pointer" }}>上一页</button>
                  <span style={{ fontSize: 13, color: V.fgMuted, minWidth: 60, textAlign: "center" }}>{currentPage} / {totalPages}</span>
                  <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} style={{ ...btnStyle("outline"), padding: "4px 12px", opacity: currentPage === totalPages ? 0.5 : 1, cursor: currentPage === totalPages ? "not-allowed" : "pointer" }}>下一页</button>
                </div>
              </div>
            )}
          </div>
        </div>

        {selAsset && <DetailPanel asset={selAsset} onClose={() => setSelected(null)} onUpdate={u => setAssets(p => p.map(a => a.id === u.id ? u : a))} onDelete={id => { setAssets(p => p.filter(a => a.id !== id)); setSelected(null); }} />}
      </div>

      {showUpload && <UploadModal onClose={() => setShowUpload(false)} onUpload={handleUpload} />}
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)} onSave={() => setUpdateKey(k => k + 1)} />}
    </div>
  );
}

const rootEl = document.getElementById('root');
if (rootEl) {
  const root = ReactDOM.createRoot(rootEl);
  root.render(<App />);
}
  </script>
</body>

</html>
